# Chat UI — connects to vector stores from sibling ingest repos on the host.
#
# Prerequisites (docker compose up in each ingest project):
#   sec-edgar-filings-to-pgvector  → edgar-pgvector on host port 5433
#   sec-edgar-filings-to-qdrant    → edgar-qdrant on host port 6333
#   Ollama on http://localhost:11434 (ollama pull bge-m3)
#
# Start:
#   docker compose up --build

services:
  sec-edgar-filings-chat:
    build: .
    image: sec-edgar-filings-chat:local
    ports:
      - "${SERVER_PORT:-8095}:${SERVER_PORT:-8095}"
    env_file:
      - path: .env
        required: false
    environment:
      SERVER_PORT: ${SERVER_PORT:-8095}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      PG_HOST: ${PG_HOST:-host.docker.internal}
      PG_PORT: ${PG_PORT:-5433}
      PG_DATABASE: ${PG_DATABASE:-edgar}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      QDRANT_URL: ${QDRANT_URL:-http://host.docker.internal:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-filing_chunks}
      DEFAULT_VECTOR_STORE: ${DEFAULT_VECTOR_STORE:-pgvector}
      PGSEARCH_ENABLED: ${PGSEARCH_ENABLED:-true}
      QDRANTSEARCH_ENABLED: ${QDRANTSEARCH_ENABLED:-true}
      QDRANT_DENSE_VECTOR: ${QDRANT_DENSE_VECTOR:-dense}
      QDRANT_BM25_VECTOR: ${QDRANT_BM25_VECTOR:-content-bm25}
      QDRANT_BM25_MODEL: ${QDRANT_BM25_MODEL:-Qdrant/bm25}
      SEARCH_TOP_K: ${SEARCH_TOP_K:-25}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\"SERVER_PORT\", \"8095\")}/')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
